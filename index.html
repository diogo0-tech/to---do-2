<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1a1a, #000000);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .btn-urgency.active {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }
        .custom-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            border-color: #d4af37;
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-light tracking-widest text-white uppercase">Activity <span class="font-semibold text-[#d4af37]">Tracker</span></h1>
            <p class="text-gray-500 text-sm mt-2">Gestão de alta performance</p>
        </header>

        <div class="glass-card p-6 md:p-8 mb-8">
            <div class="space-y-6">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Atividade</label>
                    <input type="text" id="taskName" placeholder="Digite aqui a atividade..." class="w-full p-4 rounded-xl custom-input text-white">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Área da Vida</label>
                        <select id="taskCategory" class="w-full p-4 rounded-xl custom-input text-white appearance-none">
                            <option value="Saúde">🏥 Saúde</option>
                            <option value="Casa">🏠 Casa</option>
                            <option value="Família">👨‍👩‍👧 Família</option>
                            <option value="Social">🤝 Social</option>
                            <option value="Financeiro">💰 Financeiro</option>
                            <option value="Espiritual">🧘 Espiritual</option>
                            <option value="Trabalho">💼 Trabalho/Estudo</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Prazo (Data e Hora)</label>
                        <input type="datetime-local" id="taskDeadline" class="w-full p-4 rounded-xl custom-input text-white">
                    </div>
                </div>

                <div>
                    <label class="block text-xs uppercase tracking-widest text-gray-400 mb-4">Nível de Urgência</label>
                    <div class="grid grid-cols-4 gap-2" id="urgencyContainer">
                        <button onclick="setUrgency(25)" class="btn-urgency p-3 rounded-xl border border-white/10 text-sm transition-all">25%</button>
                        <button onclick="setUrgency(50)" class="btn-urgency p-3 rounded-xl border border-white/10 text-sm transition-all">50%</button>
                        <button onclick="setUrgency(75)" class="btn-urgency p-3 rounded-xl border border-white/10 text-sm transition-all">75%</button>
                        <button onclick="setUrgency(100)" class="btn-urgency p-3 rounded-xl border border-white/10 text-sm transition-all">100%</button>
                    </div>
                </div>

                <button onclick="addTask()" class="w-full py-4 mt-4 bg-white text-black font-semibold rounded-xl hover:bg-[#d4af37] transition-all uppercase tracking-widest text-sm">
                    + Adicionar Atividade
                </button>
            </div>
        </div>

        <div id="taskList" class="space-y-4">
            </div>
    </div>

    <script>
        let currentUrgency = 25;

        // Pedir permissão para notificações
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        function setUrgency(val) {
            currentUrgency = val;
            document.querySelectorAll('.btn-urgency').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === val + '%') btn.classList.add('active');
            });
        }

        function addTask() {
            const name = document.getElementById('taskName').value;
            const category = document.getElementById('taskCategory').value;
            const deadline = document.getElementById('taskDeadline').value;

            if (!name || !deadline) {
                alert("Por favor, preencha o nome e o prazo.");
                return;
            }

            const task = {
                id: Date.now(),
                name,
                category,
                deadline,
                urgency: currentUrgency
            };

            saveTask(task);
            renderTasks();
            scheduleNotification(task);
            
            // Limpar formulário
            document.getElementById('taskName').value = '';
        }

        function saveTask(task) {
            let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            tasks.push(task);
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            
            list.innerHTML = tasks.length === 0 ? 
                '<p class="text-center text-gray-600 mt-10">Nenhuma atividade ativa.</p>' : '';

            tasks.forEach(task => {
                const dateArr = task.deadline.split('T');
                const urgencyColor = task.urgency >= 75 ? 'text-red-400' : 'text-[#d4af37]';
                
                list.innerHTML += `
                    <div class="glass-card p-5 flex justify-between items-center animate-fade-in">
                        <div>
                            <h3 class="text-white font-medium">${task.name}</h3>
                            <div class="flex gap-3 mt-1 text-xs text-gray-500 uppercase tracking-tighter">
                                <span>${task.category}</span>
                                <span class="${urgencyColor}">Urgência: ${task.urgency}%</span>
                                <span>📅 ${dateArr[0]} às ${dateArr[1]}</span>
                            </div>
                        </div>
                        <button onclick="deleteTask(${task.id})" class="text-gray-600 hover:text-red-500 transition-colors text-xl">✕</button>
                    </div>
                `;
            });
        }

        function deleteTask(id) {
            let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function scheduleNotification(task) {
            const deadlineTime = new Date(task.deadline).getTime();
            const now = new Date().getTime();
            const timeDiff = deadlineTime - now;

            if (timeDiff > 0) {
                setTimeout(() => {
                    new Notification("Prazo encerrado!", {
                        body: `Atividade: ${task.name} (${task.category}) precisa ser finalizada.`,
                        icon: "https://cdn-icons-png.flaticon.com/512/1827/1827347.png"
                    });
                }, timeDiff);
            }
        }

        // Inicialização
        setUrgency(25);
        renderTasks();
    </script>
</body>
</html>
